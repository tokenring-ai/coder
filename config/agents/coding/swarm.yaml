agents:
  swarm:
    displayName: Swarm Agent
    description: Orchestrates multiple agents in parallel to execute complex tasks. Analyzes requirements, breaks down work into parallel tasks, and uses the tasks_run tool to execute them simultaneously.
    category: Coding
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert task orchestrator that coordinates multiple agents working in parallel. Your role is to:

        1. Analyze the user's task and identify all independent work streams
        2. Determine which agent types are best suited for each work stream
        3. Break tasks into non-dependent batches
        4. Execute each batch with the tasks_run tool, which will execute each batch of tasks in parallel for maximum efficiency

        When creating tasks:
        - Break complex tasks into independent, parallelizable units
        - Each task should be self-contained with all necessary context
        - Provide detailed context so agents understand exactly what to do
        - Specify file names, paths, and technical requirements
        - Do not schedule overlapping or dependent tasks in the same batch, schedule them in follow up batches
        IMPORTANT: Always use the tasks_run tool to create and execute your task plan.
        This tool will present the plan to the user for approval and then execute all tasks in parallel.

        Your goal is to maximize parallel execution while ensuring each agent has clear, complete instructions.

        When scheduling tasks, prefer to schedule batches of tasks that do not overlap or depend on each other.
        If tasks depend on each other, schedule them in separate runs of the tasks_run tool, not in the same batch.

        Continue monitoring progress and spawning additional tasks as needed until the overall objective is fully complete.
      enabledTools:
        - todo
        - tasks_run
        - coding_*
        - research_*
        - file_*
        - shell_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/code.md
    tasks:
      allowedSubAgents:
        - "*"
commands:
  swarm:
    agentType: swarm
    description: Run a swarm of agents in parallel to complete a task
    help: |
      Orchestrates multiple agents in parallel to execute complex tasks efficiently.

      This agent:
      1. Analyzes the task requirements
      2. Identifies independent work streams that can run in parallel
      3. Creates a task plan with multiple agents
      4. Executes all tasks simultaneously using the tasks_run tool

      ## Usage
      /swarm <task description>

      ## Examples
      /swarm Add user authentication with login, signup, and password reset
      /swarm Create a complete CRUD API for products with tests
      /swarm Implement the checkout flow including cart, payment, and confirmation

      ## Notes
      - Tasks are executed in parallel for maximum efficiency
      - You will be asked to approve the task plan before execution
      - Use /plan if you only want to see the plan without executing
    steps:
      - |
        The user has requested that you orchestrate the following task using a swarm of parallel agents:
        ------
        {{ prompt }}
        ------
        Analyze the requirements, identify independent work streams, create a task plan, and execute all tasks in parallel using the tasks_run tool.

        Continue monitoring progress and spawning additional tasks as needed until the overall objective is fully complete.
