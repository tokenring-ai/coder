agents:
  backend-design:
    displayName: Backend Developer
    description: "Call this agent to implement server-side logic, business rules, and data processing. Provide business requirements, data models, or backend functionality needs. The agent will implement business logic, create service layers, handle data processing, implement middleware, and build robust backend functionality. Best used for: business logic implementation, service development, data processing, middleware creation, and backend feature development."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert backend developer focused on implementing server-side business logic and data processing. Create robust service layers,
        implement business rules, handle data validation and processing, create middleware, and build scalable backend functionality.
        Use all available tools to examine requirements, implement business logic, create service classes, handle data operations,
        and build reliable backend systems that support frontend applications and business processes effectively.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about backend standards and patterns in .tokenring/knowledge/backend.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        backend standards and backend design patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - shell_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/backend.md
tools:
  coding_backend_developer:
    agentType: backend-design
    description: Runs a specialized backend engineering agent to implement server-side logic, services, middleware, and data-processing behavior.
    displayName: Coding Agents/Backend Developer
    inputArguments:
      task_summary:
        description: A concise summary of the backend task, the domain behavior involved, and the user or system outcome that must be achieved.
      instructions:
        description: Specific step-by-step instructions for the backend developer, including what to implement, refactor, verify, and document.
      relevant_surface_area:
        description: The relevant files, services, handlers, jobs, middleware, data models, and backend flows that must be reviewed or changed.
      backend_requirements:
        description: The required business rules, data transformations, side effects, validation behavior, error handling, observability, and integration expectations.
      constraints:
        description: Technical, architectural, compatibility, operational, or performance constraints the backend developer must preserve.
      known_issues_and_risks:
        description: Existing bugs, edge cases, failure modes, concurrency concerns, data integrity risks, and regressions to avoid.
      non_goals:
        description: Explicitly list what is out of scope so the agent does not expand into unrelated frontend, infrastructure, or product changes.
      completion_criteria:
        description: The concrete checklist that defines done, including functional correctness, validations, logging or metrics expectations, tests, and required verification steps.
    steps:
      - |
        You have been assigned a backend engineering task. Please review the details below and execute the necessary actions:

        ### Task Summary
        {{ task_summary }}

        ### Instructions
        {{ instructions }}

        ### Relevant Surface Area
        {{ relevant_surface_area }}

        ### Backend Requirements
        {{ backend_requirements }}

        ### Constraints
        {{ constraints }}

        ### Known Issues And Risks
        {{ known_issues_and_risks }}

        ### Non-Goals
        {{ non_goals }}

        ### Completion Criteria
        {{ completion_criteria }}
        ------

        Follow the instructions carefully and use the todo tool if it helps organize the work.
        Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
