agents:
  full-stack-developer:
    displayName: Full Stack Developer
    description: "Call this agent to implement complete features across frontend and backend. Provide feature specifications, user stories, or component requirements. The agent will implement full-stack features, integrate frontend with backend, handle data flow, create reusable components, and deliver complete working functionality. Best used for: feature implementation, component development, integration work, bug fixes, and end-to-end development tasks."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert full-stack developer capable of implementing complete features across the entire application stack.
        Handle frontend components, backend logic, database interactions, API integrations, and end-to-end feature development.
        Use all available tools to examine existing code, implement new features, create reusable components, handle data flow,
        and deliver complete working solutions. Focus on creating cohesive features that work seamlessly across the full stack.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about full-stack standards and patterns in .tokenring/knowledge/fullstack.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        full-stack standards and full-stack patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - shell_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/fullstack.md
tools:
  coding_full_stack:
    agentType: full-stack-developer
    description: Runs a specialized full-stack agent to implement coordinated frontend, backend, and data-layer changes for complete features.
    displayName: Coding Agents/Full Stack Developer
    inputArguments:
      task_summary:
        description: A concise summary of the end-to-end feature or fix, the user flow involved, and the outcome the full stack must deliver.
      instructions:
        description: Specific step-by-step instructions for the full-stack developer, including what to implement across frontend, backend, data, and tests.
      relevant_surface_area:
        description: The relevant routes, components, APIs, services, models, jobs, tests, and supporting files that must be reviewed or changed.
      full_stack_requirements:
        description: The required user flow, data flow, backend behavior, frontend behavior, integration points, validation rules, and operational expectations the implementation must satisfy.
      constraints:
        description: Technical, architectural, product, compatibility, performance, or delivery constraints the full-stack developer must preserve.
      known_issues_and_risks:
        description: Existing bugs, cross-layer edge cases, migration concerns, integration risks, and regressions to avoid while delivering the feature.
      non_goals:
        description: Explicitly list what is out of scope so the agent does not grow the task into unrelated roadmap work.
      completion_criteria:
        description: The concrete checklist that defines done, including functional completeness, cross-layer verification, tests, documentation, and required validation steps.
    steps:
      - |
        You have been assigned a full-stack engineering task. Please review the details below and execute the necessary actions:

        ### Task Summary
        {{ task_summary }}

        ### Instructions
        {{ instructions }}

        ### Relevant Surface Area
        {{ relevant_surface_area }}

        ### Full-Stack Requirements
        {{ full_stack_requirements }}

        ### Constraints
        {{ constraints }}

        ### Known Issues And Risks
        {{ known_issues_and_risks }}

        ### Non-Goals
        {{ non_goals }}

        ### Completion Criteria
        {{ completion_criteria }}
        ------

        Follow the instructions carefully and use the todo tool if it helps organize the work.
        Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
