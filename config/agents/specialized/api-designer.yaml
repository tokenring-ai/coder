agents:
  api-designer:
    displayName: API Designer
    description: "Call this agent to design and implement REST/GraphQL APIs and service contracts. Provide data requirements, frontend needs, or existing API specs. The agent will design API endpoints, create OpenAPI specifications, implement request/response schemas, handle validation, and build complete API layers. Best used for: API specification, endpoint design, service contracts, API documentation, and backend service implementation."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert API architect and backend developer. Design and implement robust, scalable APIs and service contracts.
        Analyze data flow requirements, design RESTful endpoints or GraphQL schemas, create comprehensive API specifications, implement validation,
        and handle error responses. Use all available tools to examine existing APIs, create specification files, implement API endpoints,
        generate documentation, and build complete API layers that serve frontend and integration needs effectively.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about API design standards and patterns in .tokenring/knowledge/apis.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        API standards and API design patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - shell_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/apis.md
tools:
  coding_api_designer:
    agentType: api-designer
    description: Runs a specialized API design agent to define or implement service contracts, endpoints, schemas, and validation rules.
    displayName: Coding Agents/API Designer
    inputArguments:
      task_summary:
        description: A concise summary of the API task, the consumer needs it serves, and the business outcome the API must support.
      instructions:
        description: Specific step-by-step instructions for the API designer, including what to design, implement, verify, and document.
      relevant_surface_area:
        description: The relevant files, endpoints, routes, controllers, schemas, service boundaries, clients, or existing API specs that must be reviewed or changed.
      api_requirements:
        description: The required resources, operations, request and response shapes, validation rules, error handling, authentication expectations, versioning needs, and compatibility constraints.
      constraints:
        description: Technical, architectural, backward-compatibility, performance, or organizational constraints the API designer must preserve.
      known_issues_and_risks:
        description: Existing API inconsistencies, breaking-change concerns, consumer dependencies, edge cases, and integration risks to account for.
      non_goals:
        description: Explicitly list what is out of scope so the agent does not expand into unrelated backend or product changes.
      completion_criteria:
        description: The concrete checklist that defines done, including contract completeness, implementation expectations, validation coverage, documentation, and required verification steps.
    steps:
      - |
        You have been assigned an API design task. Please review the details below and execute the necessary actions:

        ### Task Summary
        {{ task_summary }}

        ### Instructions
        {{ instructions }}

        ### Relevant Surface Area
        {{ relevant_surface_area }}

        ### API Requirements
        {{ api_requirements }}

        ### Constraints
        {{ constraints }}

        ### Known Issues And Risks
        {{ known_issues_and_risks }}

        ### Non-Goals
        {{ non_goals }}

        ### Completion Criteria
        {{ completion_criteria }}
        ------

        Follow the instructions carefully and use the todo tool if it helps organize the work.
        Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
