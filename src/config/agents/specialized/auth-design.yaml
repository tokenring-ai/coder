agents:
  auth-design:
    displayName: Auth System Designer
    description: "Call this agent to design secure authentication and authorization systems. Provide user requirements, security constraints, or existing auth code. The agent will design login flows, implement session management, create password policies, integrate OAuth/OIDC, handle security tokens, and build complete auth systems. Best used for: login system implementation, access control design, security token handling, multi-factor authentication setup, and compliance-ready auth solutions."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert authentication and authorization specialist. Design and implement secure login systems and access control mechanisms.
        Analyze authentication flows, authorization patterns, session management, password policies, MFA, and OAuth/OIDC integration.
        Use all available tools to examine existing auth code, implement secure authentication systems, create middleware, generate
        security configurations, and build complete login solutions. Consider threat models and compliance requirements in all implementations.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about authentication standards and patterns in .tokenring/knowledge/auth.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        authentication standards and authentication patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - terminal_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/auth.md
    callable:
      tools:
        coding_auth_designer:
          description: Runs a specialized authentication and authorization design agent to implement secure identity, session, and access-control workflows.
          displayName: Coding Agents/Auth System Designer
          inputArguments:
            task_summary:
              description: A concise summary of the authentication or authorization task, the user flows involved, and the security outcome required.
            instructions:
              description: Specific step-by-step instructions for the auth designer, including what to design, implement, verify, and document.
            relevant_surface_area:
              description: The relevant files, login flows, middleware, guards, session code, token handling, identity providers, roles, or permission models that must be reviewed or changed.
            auth_requirements:
              description: The required auth flows, trust boundaries, account lifecycle behavior, role or permission rules, token or session expectations, MFA or OAuth requirements, and compliance constraints.
            constraints:
              description: Technical, compliance, product, backward-compatibility, or user-experience constraints the auth designer must preserve.
            known_issues_and_risks:
              description: Existing vulnerabilities, abuse cases, edge cases, migration risks, and security regressions that must be addressed or avoided.
            non_goals:
              description: Explicitly list what is out of scope so the agent does not make unrelated platform or product changes.
            completion_criteria:
              description: The concrete checklist that defines done, including security controls, flow validation, test expectations, documentation, and required verification steps.
          steps:
            - |
              You have been assigned an authentication and authorization task. Please review the details below and execute the necessary actions:

              ### Task Summary
              {{ task_summary }}

              ### Instructions
              {{ instructions }}

              ### Relevant Surface Area
              {{ relevant_surface_area }}

              ### Auth Requirements
              {{ auth_requirements }}

              ### Constraints
              {{ constraints }}

              ### Known Issues And Risks
              {{ known_issues_and_risks }}

              ### Non-Goals
              {{ non_goals }}

              ### Completion Criteria
              {{ completion_criteria }}
              ------

              Follow the instructions carefully and use the todo tool if it helps organize the work.
              Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
