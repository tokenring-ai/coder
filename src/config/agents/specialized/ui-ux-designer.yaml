agents:
  ui-ux-designer:
    displayName: UI/UX Designer
    description: "Call this agent to design user interfaces, user experiences, and visual prototypes. Provide user requirements, business goals, or existing designs. The agent will create wireframes, design systems, user flows, accessibility guidelines, responsive layouts, and interactive prototypes. Best used for: UI mockups, user journey mapping, design systems, accessibility compliance, visual design, and user experience optimization."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert UI/UX designer focused on creating intuitive, accessible user experiences. Design user interfaces, create wireframes,
        establish design systems, map user journeys, and ensure accessibility compliance. Create responsive layouts, interactive prototypes,
        and visual designs that enhance user engagement. Use all available tools to analyze user requirements, create design documentation,
        implement design systems, generate style guides, and build user-centered interfaces that drive business goals and user satisfaction.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about UI/UX design standards and patterns in .tokenring/knowledge/ui-ux.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        UI/UX design standards and UI/UX design patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - terminal_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/ui-ux.md
    callable:
      tools:
        coding_ui_ux_designer:
          description: Runs a specialized UI and UX design agent to improve interfaces, user flows, and interaction design.
          displayName: Coding Agents/UI UX Designer
          inputArguments:
            task_summary:
              description: A concise summary of the UI or UX task, the target users involved, and the experience outcome required.
            instructions:
              description: Specific step-by-step instructions for the UI or UX designer, including what to analyze, redesign, specify, validate, and document.
            relevant_surface_area:
              description: The relevant screens, flows, components, wireframes, prototypes, user journeys, and design assets that must be reviewed or changed.
            ui_ux_requirements:
              description: The required usability goals, information architecture, interaction patterns, accessibility expectations, responsive behavior, and visual constraints the design work must satisfy.
            constraints:
              description: Brand, design-system, technical, product, timeline, or stakeholder constraints the UI or UX designer must preserve.
            known_issues_and_risks:
              description: Existing usability problems, friction points, accessibility concerns, user confusions, and edge cases that must be addressed or avoided.
            non_goals:
              description: Explicitly list what is out of scope so the agent does not broaden into unrelated implementation or strategy work.
            completion_criteria:
              description: The concrete checklist that defines done, including flow clarity, design rationale, accessibility, deliverables, and required verification steps.
          steps:
            - |
              You have been assigned a UI and UX design task. Please review the details below and execute the necessary actions:

              ### Task Summary
              {{ task_summary }}

              ### Instructions
              {{ instructions }}

              ### Relevant Surface Area
              {{ relevant_surface_area }}

              ### UI UX Requirements
              {{ ui_ux_requirements }}

              ### Constraints
              {{ constraints }}

              ### Known Issues And Risks
              {{ known_issues_and_risks }}

              ### Non-Goals
              {{ non_goals }}

              ### Completion Criteria
              {{ completion_criteria }}
              ------

              Follow the instructions carefully and use the todo tool if it helps organize the work.
              Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
