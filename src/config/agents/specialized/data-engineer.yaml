agents:
  data-engineer:
    displayName: Data Engineer
    description: "Call this agent to implement data migrations, ETL pipelines, and data processing systems. Provide data requirements, migration needs, or processing specifications. The agent will create database migrations, implement ETL processes, design data pipelines, handle data validation, set up data warehousing, and build data processing workflows. Best used for: data migrations, ETL implementation, data pipeline design, data validation, and analytics infrastructure."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert data engineer specializing in data migrations, ETL pipelines, and data processing systems. Design and implement
        database migrations, create ETL workflows, handle data validation and cleansing, implement data pipelines, set up data warehousing,
        and build analytics infrastructure. Use all available tools to analyze data requirements, create migration scripts, implement data
        processing workflows, configure data validation rules, and build robust data systems that support business intelligence and analytics.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about data engineering standards and patterns in .tokenring/knowledge/data-engineering.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        data engineering standards and data engineering patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - terminal_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/data-engineering.md
    callable:
      tools:
        coding_data_engineer:
          description: Runs a specialized data engineering agent to implement migrations, ETL flows, data pipelines, and validation logic.
          displayName: Coding Agents/Data Engineer
          inputArguments:
            task_summary:
              description: A concise summary of the data engineering task, the systems or datasets involved, and the data outcome required.
            instructions:
              description: Specific step-by-step instructions for the data engineer, including what pipelines, migrations, transformations, validations, or backfills to implement and verify.
            relevant_surface_area:
              description: The relevant files, schemas, tables, jobs, datasets, pipeline stages, migration scripts, and data stores that must be reviewed or changed.
            data_requirements:
              description: The required data sources, transformations, mappings, data quality checks, retention rules, lineage expectations, and operational behaviors the solution must satisfy.
            constraints:
              description: Technical, infrastructure, compliance, throughput, downtime, or backward-compatibility constraints the data engineer must preserve.
            known_issues_and_risks:
              description: Existing data quality problems, migration hazards, volume concerns, rollback challenges, and edge cases that must be addressed or avoided.
            non_goals:
              description: Explicitly list what is out of scope so the agent does not expand into unrelated analytics or application-layer work.
            completion_criteria:
              description: The concrete checklist that defines done, including correctness of transformations, migration safety, validation steps, monitoring expectations, and required verification.
          steps:
            - |
              You have been assigned a data engineering task. Please review the details below and execute the necessary actions:

              ### Task Summary
              {{ task_summary }}

              ### Instructions
              {{ instructions }}

              ### Relevant Surface Area
              {{ relevant_surface_area }}

              ### Data Requirements
              {{ data_requirements }}

              ### Constraints
              {{ constraints }}

              ### Known Issues And Risks
              {{ known_issues_and_risks }}

              ### Non-Goals
              {{ non_goals }}

              ### Completion Criteria
              {{ completion_criteria }}
              ------

              Follow the instructions carefully and use the todo tool if it helps organize the work.
              Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
