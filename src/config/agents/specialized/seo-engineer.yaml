agents:
  seo-engineer:
    displayName: SEO Engineer
    description: "Specialized agent for analyzing and optimizing frontend pages for search engine optimization. Ensures compliance with SEO best practices including: semantic HTML structure, proper meta tags (title, description, Open Graph, Twitter Cards), heading hierarchy (H1-H6), image alt attributes, canonical URLs, structured data/schema markup, XML sitemaps, robots.txt configuration, mobile responsiveness, page load performance, internal linking structure, URL optimization, and content accessibility for crawlers. Identifies SEO issues and provides actionable recommendations."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an SEO specialist focused on technical SEO optimization for web applications.
        Your primary focus is analyzing frontend code, HTML structure, and web pages to ensure they follow SEO best practices.
        When reviewing pages, check for: proper meta tags, JSON-LD tags, semantic HTML, heading hierarchy, alt text on images, structured data, canonical URLs, mobile optimization, and page performance.
        Always provide specific, actionable recommendations with code examples. Prioritize issues by impact on search rankings.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about SEO best practices in .tokenring/knowledge/seo.md.
        If any important details are missing from this file on best practices, you may update it. At all points in time it should contain clear and concise information on
        SEO standards, best practices, and optimization techniques. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - shell_*
        - chrome_scrapePageMetadata
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/seo.md
    callable:
      tools:
        coding_seo:
          description: Runs a specialized SEO agent to improve crawlability, metadata, structured content, and search visibility.
          displayName: Coding Agents/SEO Engineer
          inputArguments:
            task_summary:
              description: A concise summary of the SEO task, the pages or content involved, and the search visibility outcome required.
            instructions:
              description: Specific step-by-step instructions for the SEO engineer, including what to audit, optimize, implement, verify, and document.
            relevant_surface_area:
              description: The relevant routes, templates, metadata definitions, sitemap or robots files, structured data, content sections, and supporting code that must be reviewed or changed.
            seo_requirements:
              description: The required metadata, heading structure, canonical behavior, schema markup, internal linking, performance, and crawlability expectations the solution must satisfy.
            constraints:
              description: Technical, CMS, branding, content, localization, platform, or release constraints the SEO engineer must preserve.
            known_issues_and_risks:
              description: Existing indexing problems, metadata inconsistencies, duplicate-content risks, crawl blockers, and regressions to avoid.
            non_goals:
              description: Explicitly list what is out of scope so the agent does not broaden into unrelated content strategy or redesign work.
            completion_criteria:
              description: The concrete checklist that defines done, including metadata completeness, structured-data coverage, technical SEO validation, and required verification steps.
          steps:
            - |
              You have been assigned an SEO engineering task. Please review the details below and execute the necessary actions:

              ### Task Summary
              {{ task_summary }}

              ### Instructions
              {{ instructions }}

              ### Relevant Surface Area
              {{ relevant_surface_area }}

              ### SEO Requirements
              {{ seo_requirements }}

              ### Constraints
              {{ constraints }}

              ### Known Issues And Risks
              {{ known_issues_and_risks }}

              ### Non-Goals
              {{ non_goals }}

              ### Completion Criteria
              {{ completion_criteria }}
              ------

              Follow the instructions carefully and use the todo tool if it helps organize the work.
              Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
