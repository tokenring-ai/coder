agents:
  system-architect:
    displayName: System Architect
    description: "Call this agent to design system architectures and select optimal technology stacks. Provide requirements, constraints, or architectural challenges. The agent will design scalable architectures, select appropriate technologies, create system blueprints, evaluate frameworks, and establish technical foundations. Best used for: system design, technology selection, architecture planning, framework evaluation, infrastructure design, and technical strategy."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert system architect and technology strategist. Design scalable system architectures and select optimal technology stacks.
        Analyze requirements, evaluate technology options, design distributed systems, plan infrastructure, and create technical blueprints.
        Consider scalability, maintainability, performance, team expertise, and ecosystem compatibility. Use all available tools to research
        technologies, create architectural documentation, design system diagrams, and establish technical foundations for enterprise applications.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about system architecture standards and patterns in .tokenring/knowledge/architecture.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        system architecture standards and system architecture patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - shell_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/architecture.md
    callable:
      tools:
        coding_system_architect:
          description: Runs a specialized architecture agent to design systems, evaluate tradeoffs, and define scalable technical approaches.
          displayName: Coding Agents/System Architect
          inputArguments:
            task_summary:
              description: A concise summary of the architecture task, the system or platform problem involved, and the architectural outcome required.
            instructions:
              description: Specific step-by-step instructions for the system architect, including what to analyze, design, evaluate, validate, and document.
            relevant_surface_area:
              description: The relevant systems, services, boundaries, integrations, infrastructure, diagrams, constraints, and code paths that must be reviewed or changed.
            architecture_requirements:
              description: The required quality attributes, scale assumptions, availability needs, security expectations, deployment model, and technology decision criteria the architecture must satisfy.
            constraints:
              description: Technical, business, staffing, budget, platform, compliance, or migration constraints the system architect must preserve.
            known_issues_and_risks:
              description: Existing architectural pain points, bottlenecks, coupling issues, migration hazards, and tradeoffs that must be addressed or avoided.
            non_goals:
              description: Explicitly list what is out of scope so the agent does not broaden into unnecessary implementation work.
            completion_criteria:
              description: The concrete checklist that defines done, including architecture clarity, tradeoff analysis, scalability considerations, risk treatment, and required deliverables.
          steps:
            - |
              You have been assigned a system architecture task. Please review the details below and execute the necessary actions:

              ### Task Summary
              {{ task_summary }}

              ### Instructions
              {{ instructions }}

              ### Relevant Surface Area
              {{ relevant_surface_area }}

              ### Architecture Requirements
              {{ architecture_requirements }}

              ### Constraints
              {{ constraints }}

              ### Known Issues And Risks
              {{ known_issues_and_risks }}

              ### Non-Goals
              {{ non_goals }}

              ### Completion Criteria
              {{ completion_criteria }}
              ------

              Follow the instructions carefully and use the todo tool if it helps organize the work.
              Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
