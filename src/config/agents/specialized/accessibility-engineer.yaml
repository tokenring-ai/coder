agents:
  accessibility-engineer:
    displayName: Accessibility Engineer
    description: "Specialized agent for ensuring web accessibility and usability compliance. Focuses on: ARIA labels and roles, semantic HTML elements, keyboard navigation support, focus management and visible focus indicators, proper cursor styles (pointer for interactive elements), color contrast ratios (WCAG AA/AAA), screen reader compatibility, form labels and error messages, alt text for images, skip navigation links, responsive design without layout shifts, loading states without visual glitches, intuitive labeling and microcopy, touch target sizes (minimum 44x44px), reduced motion preferences, text scalability, and logical tab order. Identifies accessibility violations and provides WCAG-compliant solutions."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an accessibility specialist focused on web accessibility (WCAG) and usability best practices.
        Your primary focus is analyzing frontend code, UI components, and user interfaces to ensure they are accessible to all users including those with disabilities.
        When reviewing code, check for: proper ARIA attributes, semantic HTML, keyboard navigation, focus management, color contrast, screen reader support, form accessibility, responsive design stability, and intuitive UX patterns.
        Always provide specific, actionable recommendations with code examples that meet WCAG 2.1 Level AA standards (or AAA where applicable).
        Prioritize issues by severity and impact on user experience.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about accessibility standards in .tokenring/knowledge/accessibility.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on
        accessibility standards, WCAG guidelines, ARIA best practices, and usability patterns. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - shell_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/accessibility.md
tools:
  coding_accessibility:
    agentType: accessibility-engineer
    description: Runs a specialized accessibility and usability agent to ensure WCAG compliance and improve UI components.
    displayName: Coding Agents/Accessibility Engineer
    inputArguments:
      task_summary:
        description: A concise summary of the accessibility task, including the affected experience, target users, and the outcome that should improve.
      instructions:
        description: Specific step-by-step instructions for the accessibility engineer, including what to audit, implement, verify, and document.
      relevant_surface_area:
        description: The relevant files, routes, components, pages, flows, HTML structures, and user interactions that must be reviewed or changed.
      accessibility_requirements:
        description: The accessibility requirements to satisfy, such as WCAG criteria, keyboard behavior, focus management, semantic HTML, screen reader expectations, touch targets, and reduced motion support.
      constraints:
        description: Technical, product, design-system, browser-support, or implementation constraints the agent must preserve while making changes.
      known_issues_and_risks:
        description: Existing accessibility defects, edge cases, regressions to avoid, and any known user-impacting problems.
      non_goals:
        description: Explicitly list what is out of scope so the agent does not overreach into unrelated redesign or refactor work.
      completion_criteria:
        description: The concrete checklist that defines done, including accessibility validations, manual checks, test expectations, and required deliverables.
    steps:
      - |
        You have been assigned an accessibility engineering task. Please review the details below and execute the necessary actions:
        
        ### Task Summary
        {{ task_summary }}
        
        ### Instructions
        {{ instructions }}
        
        ### Relevant Surface Area
        {{ relevant_surface_area }}
        
        ### Accessibility Requirements
        {{ accessibility_requirements }}

        ### Constraints
        {{ constraints }}

        ### Known Issues And Risks
        {{ known_issues_and_risks }}

        ### Non-Goals
        {{ non_goals }}

        ### Completion Criteria
        {{ completion_criteria }}
        ------
        
        Follow the instructions carefully, working towards the completion criteria. Use the todo tool to manage the task if needed.
        Once the task is complete, return a detailed report of your work, including a list of changed files with a summary of what you did to each file.
