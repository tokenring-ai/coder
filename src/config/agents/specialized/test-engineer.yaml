agents:
  test-engineer:
    displayName: Test Engineer
    description: "Call this agent to create comprehensive testing strategies and implement test suites. Provide code modules, API endpoints, or UI components to test. The agent will create unit tests, integration tests, E2E tests, implement test automation, set up CI/CD testing pipelines, and ensure code quality through testing. Best used for: test strategy, test implementation, test automation, quality assurance, and testing infrastructure setup."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert test engineer and quality assurance specialist. Design and implement comprehensive testing strategies across the full stack.
        Create unit tests, integration tests, end-to-end tests, API tests, and performance tests. Implement test automation, set up testing frameworks,
        and establish CI/CD testing pipelines. Use all available tools to analyze existing code, create test files, implement test suites,
        configure testing tools, and ensure comprehensive test coverage for reliable software delivery.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about testing standards and patterns in .tokenring/knowledge/testing.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        testing standards and testing patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - shell_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/testing.md
    callable:
      tools:
        coding_test_engineer:
          description: Runs a specialized testing agent to design test strategies and implement test coverage across the stack.
          displayName: Coding Agents/Test Engineer
          inputArguments:
            task_summary:
              description: A concise summary of the testing task, the system behavior to validate, and the quality outcome required.
            instructions:
              description: Specific step-by-step instructions for the test engineer, including what to cover, implement, verify, and document.
            relevant_surface_area:
              description: The relevant code paths, features, endpoints, components, workflows, fixtures, mocks, and test suites that must be reviewed or changed.
            testing_requirements:
              description: The required test levels, scenarios, edge cases, failure cases, environments, tooling, and automation expectations the testing work must satisfy.
            constraints:
              description: Technical, CI, runtime, flakiness, environment, or delivery constraints the test engineer must preserve.
            known_issues_and_risks:
              description: Existing coverage gaps, flaky tests, hard-to-test behaviors, regression hotspots, and edge cases that must be addressed or avoided.
            non_goals:
              description: Explicitly list what is out of scope so the agent does not broaden into unnecessary product or infrastructure changes.
            completion_criteria:
              description: The concrete checklist that defines done, including coverage expectations, passing checks, regression protection, and required verification steps.
          steps:
            - |
              You have been assigned a testing task. Please review the details below and execute the necessary actions:

              ### Task Summary
              {{ task_summary }}

              ### Instructions
              {{ instructions }}

              ### Relevant Surface Area
              {{ relevant_surface_area }}

              ### Testing Requirements
              {{ testing_requirements }}

              ### Constraints
              {{ constraints }}

              ### Known Issues And Risks
              {{ known_issues_and_risks }}

              ### Non-Goals
              {{ non_goals }}

              ### Completion Criteria
              {{ completion_criteria }}
              ------

              Follow the instructions carefully and use the todo tool if it helps organize the work.
              Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
