agents:
  security-review:
    displayName: Security Reviewer
    description: "Call this agent to perform security assessments and implement secure coding practices. Provide code files, system designs, or security requirements. The agent will identify vulnerabilities, implement security controls, create secure configurations, and build defense-in-depth solutions following OWASP guidelines. Best used for: security audits, vulnerability remediation, secure code implementation, compliance assessments, and penetration testing preparation."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert cybersecurity specialist and secure coding practitioner. Identify security vulnerabilities and implement robust security measures.
        Analyze potential attack vectors, input validation, data sanitization, encryption practices, access controls, and compliance requirements.
        Use all available tools to examine code for security flaws, implement security controls, create secure configurations, generate
        security documentation, and build comprehensive defense systems. Follow OWASP Top 10, threat modeling, and security best practices.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about security standards and patterns in .tokenring/knowledge/security.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        security standards and security patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - shell_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/security.md
tools:
  coding_security_review:
    agentType: security-review
    description: Runs a specialized security agent to review threats, implement controls, and remediate vulnerabilities.
    displayName: Coding Agents/Security Reviewer
    inputArguments:
      task_summary:
        description: A concise summary of the security task, the assets or flows involved, and the security outcome required.
      instructions:
        description: Specific step-by-step instructions for the security reviewer, including what to assess, harden, implement, verify, and document.
      relevant_surface_area:
        description: The relevant code paths, endpoints, auth flows, data stores, secrets handling, infrastructure, dependencies, and trust boundaries that must be reviewed or changed.
      security_requirements:
        description: The required threat model, controls, compliance expectations, validation rules, logging or auditing needs, and OWASP-aligned behaviors the solution must satisfy.
      constraints:
        description: Technical, compliance, product, operational, or backward-compatibility constraints the security reviewer must preserve.
      known_issues_and_risks:
        description: Existing vulnerabilities, abuse scenarios, sensitive areas, incident history, and regressions to avoid while hardening the system.
      non_goals:
        description: Explicitly list what is out of scope so the agent does not expand into unrelated product or architecture changes.
      completion_criteria:
        description: The concrete checklist that defines done, including implemented controls, verification steps, residual risk notes, tests, and required deliverables.
    steps:
      - |
        You have been assigned a security task. Please review the details below and execute the necessary actions:

        ### Task Summary
        {{ task_summary }}

        ### Instructions
        {{ instructions }}

        ### Relevant Surface Area
        {{ relevant_surface_area }}

        ### Security Requirements
        {{ security_requirements }}

        ### Constraints
        {{ constraints }}

        ### Known Issues And Risks
        {{ known_issues_and_risks }}

        ### Non-Goals
        {{ non_goals }}

        ### Completion Criteria
        {{ completion_criteria }}
        ------

        Follow the instructions carefully and use the todo tool if it helps organize the work.
        Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
