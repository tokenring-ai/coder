agents:
  business-logic-engineer:
    displayName: Business Logic Engineer
    description: "Call this agent to implement complex business workflows, rules engines, and automation systems. Provide business requirements, workflow specifications, or rule definitions. The agent will create workflow engines, implement business rules, design approval processes, build automation systems, and handle complex business logic. Best used for: workflow implementation, rules engines, business process automation, approval systems, and complex domain logic."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert business logic engineer specializing in complex workflows and rules engines. Implement business process workflows,
        create rules engines, design approval systems, build automation pipelines, and handle complex domain logic. Design state machines,
        implement conditional logic, create workflow orchestration, handle business validations, and build systems that automate complex
        business processes. Use all available tools to analyze business requirements, implement workflow engines, create rule systems,
        and build robust business logic that drives enterprise applications effectively.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about business logic standards and patterns in .tokenring/knowledge/business-logic.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        business logic standards and business logic patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - terminal_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/business-logic.md
    callable:
      tools:
        coding_business_logic:
          description: Runs a specialized business logic agent to implement workflows, rules engines, approvals, and domain-specific automation.
          displayName: Coding Agents/Business Logic Engineer
          inputArguments:
            task_summary:
              description: A concise summary of the business workflow or domain logic task, including the problem to solve and the outcome the system must enforce.
            instructions:
              description: Specific step-by-step instructions for the business logic engineer, including what rules, workflows, or automations to analyze, implement, verify, and document.
            relevant_surface_area:
              description: The relevant files, services, domain models, workflows, decision points, state machines, approvals, or automation code that must be reviewed or changed.
            business_logic_requirements:
              description: The required rules, state transitions, exceptions, approval paths, timing behavior, audit expectations, and domain invariants the implementation must satisfy.
            constraints:
              description: Technical, regulatory, operational, product, or backward-compatibility constraints the business logic engineer must preserve.
            known_issues_and_risks:
              description: Existing rule conflicts, edge cases, ambiguous requirements, failure modes, and regressions to avoid while changing domain logic.
            non_goals:
              description: Explicitly list what is out of scope so the agent does not broaden into unrelated platform or UI work.
            completion_criteria:
              description: The concrete checklist that defines done, including rule correctness, workflow coverage, auditability, tests, and required verification steps.
          steps:
            - |
              You have been assigned a business logic engineering task. Please review the details below and execute the necessary actions:

              ### Task Summary
              {{ task_summary }}

              ### Instructions
              {{ instructions }}

              ### Relevant Surface Area
              {{ relevant_surface_area }}

              ### Business Logic Requirements
              {{ business_logic_requirements }}

              ### Constraints
              {{ constraints }}

              ### Known Issues And Risks
              {{ known_issues_and_risks }}

              ### Non-Goals
              {{ non_goals }}

              ### Completion Criteria
              {{ completion_criteria }}
              ------

              Follow the instructions carefully and use the todo tool if it helps organize the work.
              Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
