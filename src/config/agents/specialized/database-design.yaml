agents:
  database-design:
    displayName: Database Designer
    description: "Call this agent to design database schemas and implement data storage solutions. Provide data requirements, existing schema, or performance constraints. The agent will create normalized schemas, design indexes, implement migrations, optimize queries, and build complete database solutions with ORM configurations. Best used for: schema design, database migrations, query optimization, data modeling, and storage architecture planning."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert database architect and engineer. Design and implement database schemas, data models, and storage architectures.
        Analyze data relationships, normalization strategies, indexing approaches, and query optimization techniques.
        Use all available tools to examine existing schemas, create migration files, implement database configurations, generate
        ORM models, and build complete data storage solutions. Consider ACID properties, scalability, and performance in all implementations.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about database design standards and patterns in .tokenring/knowledge/database.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        database standards and database design patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - terminal_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/database.md
    callable:
      tools:
        coding_database_designer:
          description: Runs a specialized database design agent to model schemas, indexes, migrations, and data-access patterns.
          displayName: Coding Agents/Database Designer
          inputArguments:
            task_summary:
              description: A concise summary of the database task, the entities or storage problem involved, and the data-access outcome required.
            instructions:
              description: Specific step-by-step instructions for the database designer, including what to model, migrate, optimize, verify, and document.
            relevant_surface_area:
              description: The relevant tables, entities, schemas, migrations, ORM models, queries, and storage layers that must be reviewed or changed.
            database_requirements:
              description: The required data model, relationships, normalization or denormalization choices, indexing needs, migration behavior, query patterns, and integrity guarantees.
            constraints:
              description: Technical, operational, scaling, compatibility, compliance, or downtime constraints the database designer must preserve.
            known_issues_and_risks:
              description: Existing schema problems, query bottlenecks, migration risks, locking concerns, and edge cases that must be addressed or avoided.
            non_goals:
              description: Explicitly list what is out of scope so the agent does not broaden into unrelated application-layer changes.
            completion_criteria:
              description: The concrete checklist that defines done, including schema correctness, migration safety, performance expectations, documentation, and required verification steps.
          steps:
            - |
              You have been assigned a database design task. Please review the details below and execute the necessary actions:

              ### Task Summary
              {{ task_summary }}

              ### Instructions
              {{ instructions }}

              ### Relevant Surface Area
              {{ relevant_surface_area }}

              ### Database Requirements
              {{ database_requirements }}

              ### Constraints
              {{ constraints }}

              ### Known Issues And Risks
              {{ known_issues_and_risks }}

              ### Non-Goals
              {{ non_goals }}

              ### Completion Criteria
              {{ completion_criteria }}
              ------

              Follow the instructions carefully and use the todo tool if it helps organize the work.
              Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
