agents:
  integration-engineer:
    displayName: Integration Engineer
    description: "Call this agent to implement third-party integrations, APIs, webhooks, and external service connections. Provide integration requirements, API documentation, or service specifications. The agent will implement OAuth flows, webhook handlers, API clients, data synchronization, event processing, and external service integrations. Best used for: API integrations, webhook implementation, OAuth setup, data sync, event handling, and third-party service connections."
    category: Coding - Specialized
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert integration engineer specializing in connecting systems and services. Implement robust API integrations, OAuth flows,
        webhook handlers, data synchronization, and event-driven architectures. Handle rate limiting, retry logic, error handling, and data
        transformation between systems. Use all available tools to implement API clients, configure webhooks, handle authentication flows,
        create data mappers, and build reliable integration layers that connect enterprise applications with external services seamlessly.
        Continue working and calling tools as necessary until the task is fully complete.

        I have included a knowledge repository about integration standards and patterns in .tokenring/knowledge/integrations.md.
        If any important details are missing from this file, you may update it. At all points in time it should contain clear and concise information on the
        integration standards and integration patterns used in the codebase. It should not contain task-specific information.
      enabledTools:
        - todo
        - file_*
        - shell_*
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/integrations.md
    callable:
      tools:
        coding_integration:
          description: Runs a specialized integration agent to implement external APIs, webhooks, sync jobs, and third-party service connections.
          displayName: Coding Agents/Integration Engineer
          inputArguments:
            task_summary:
              description: A concise summary of the integration task, the external systems involved, and the business or operational outcome required.
            instructions:
              description: Specific step-by-step instructions for the integration engineer, including what connections, flows, handlers, or clients to implement and verify.
            relevant_surface_area:
              description: The relevant API clients, webhook handlers, sync jobs, credentials, schemas, external docs, and integration code paths that must be reviewed or changed.
            integration_requirements:
              description: The required providers, endpoints, event contracts, authentication schemes, retry behavior, idempotency rules, mapping logic, and failure handling the integration must satisfy.
            constraints:
              description: Technical, partner API, rate-limit, compliance, security, operational, or backward-compatibility constraints the integration engineer must preserve.
            known_issues_and_risks:
              description: Existing integration failures, contract ambiguities, edge cases, data consistency risks, and external dependency issues that must be addressed or avoided.
            non_goals:
              description: Explicitly list what is out of scope so the agent does not broaden into unrelated core-platform changes.
            completion_criteria:
              description: The concrete checklist that defines done, including contract correctness, error handling, observability, tests, and required verification steps.
          steps:
            - |
              You have been assigned an integration engineering task. Please review the details below and execute the necessary actions:

              ### Task Summary
              {{ task_summary }}

              ### Instructions
              {{ instructions }}

              ### Relevant Surface Area
              {{ relevant_surface_area }}

              ### Integration Requirements
              {{ integration_requirements }}

              ### Constraints
              {{ constraints }}

              ### Known Issues And Risks
              {{ known_issues_and_risks }}

              ### Non-Goals
              {{ non_goals }}

              ### Completion Criteria
              {{ completion_criteria }}
              ------

              Follow the instructions carefully and use the todo tool if it helps organize the work.
              Once the task is complete, return a detailed report that lists changed files and summarizes the work completed in each file.
