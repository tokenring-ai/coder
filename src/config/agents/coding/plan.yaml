agents:
  plan:
    displayName: Planning Agent
    description: Analyzes a task and generates a detailed implementation plan with specific steps, files to modify, and agent assignments. Returns the plan for review without executing it.
    category: Coding
    chat:
      context:
        initial:
          - type: system-message
          - type: tool-context
          - type: search-files
          - type: current-message
      systemPrompt: |
        You are an expert software architect and planner. Your role is to analyze tasks and create detailed implementation plans.

        When given a task, you should:
        1. Analyze the existing codebase to understand the context
        2. Break down the task into clear, actionable steps
        3. Identify all files that need to be created or modified
        4. Recommend the most appropriate agent type for each step
        5. Identify dependencies between steps
        6. Estimate the complexity of each step

        Output a clear, structured plan that can be reviewed before execution.
        Do NOT execute the plan - only generate it.
        Use the todo tool to organize your plan into a checklist format.

        Your plan should be comprehensive enough that another agent could execute it without additional context.
      enabledTools:
        - todo
        - file_*
        - shell_*
        - coding_explore
    tasks:
      allowedSubAgents:
        - coding_explore
    filesystem:
      selectedFiles:
        - .tokenring/knowledge/code.md
    callable:
      commands:
        plan:
          description: Generate an implementation plan for a task
          help: |
            Analyzes a task and generates a detailed implementation plan without executing it.
            
            The plan includes:
            - Task breakdown into manageable steps
            - Files that need to be created or modified
            - Recommended agent types for each step
            - Dependencies between steps
            - Estimated complexity
            
            ## Usage
            /plan <task description>
            
            ## Examples
            /plan Add user authentication with JWT tokens
            /plan Create a REST API for managing products
            /plan Implement a dashboard with charts and filters
            
            ## Notes
            - This agent only creates a plan, it does not execute it
            - Use /swarm to execute a plan with multiple agents in parallel
            - Use /code or the team leader to execute the plan step by step
          steps:
            - |
              The user has requested a detailed implementation plan for the following task:
              ------
              {{ prompt }}
              ------
              Analyze the codebase, break down the task into clear actionable steps, identify files to create or modify, recommend agent types for each step, and note dependencies.
              
              Output a structured plan using the todo tool. Do NOT execute the plan.
      tools:
        plan:
          description: Analyze a task and generate a detailed implementation plan with steps, files to modify, and agent assignments. Returns the plan without executing it.
          displayName: Agent/Task Planning
          inputArguments:
            prompt:
              description: A description of the task to plan, including goals and any known constraints.
            context:
              description: The context of the conversation, including any previous messages.
          steps:
            - |
              The user has requested a detailed implementation plan for the following task:
              ------
              {{ prompt }}
  
              Important context:
              {{ context }}
              ------
              Analyze the codebase, break down the task into clear actionable steps, identify files to create or modify, recommend agent types for each step, and note dependencies.
  
              Output a structured plan using the todo tool. Do NOT execute the plan.
